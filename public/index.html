<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>IsoEngineTS - experimental isometric tile engine</title>
        <link rel="stylesheet" href="./static/css/style.css" />
    </head>
    <body>
        <div id="stage">
            <canvas id="canvas"></canvas>
            <div id="hud">

        </div>
        <img id="player" src="./assets/player.png"/>
        <script src="./static/bundle/script.js"></script>
    </body>
</html>
